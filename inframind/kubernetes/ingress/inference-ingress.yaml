apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inference-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  tls:
    - hosts:
        - inference.local
      secretName: inference-tls
  rules:
    - host: inference.local
      http:
        paths:
          - path: /(.*)
            pathType: Prefix
            backend:
              service:
                name: inference-service
                port:
                  number: 8000
